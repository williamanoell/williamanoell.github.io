<section id="skills">
  <div class="container">
    <h2 class="section-title animate-on-scroll">Skills</h2>
    <p class="section-subtitle animate-on-scroll animate-delay-1">
      Tecnologias e ferramentas que utilizo no dia a dia para criar soluções digitais
    </p>
    <div class="section-divider animate-on-scroll animate-delay-1"></div>

    <div class="skills-grid">
      <div
        class="skill-category glass-card animate-on-scroll"
        *ngFor="let cat of skillCategories; let i = index"
        [ngClass]="'animate-delay-' + (i + 1)"
      >
        <div class="category-header">
          <span class="category-icon">{{ cat.icon }}</span>
          <h3 class="category-name">{{ cat.category }}</h3>
        </div>

        <div class="skill-badges">
          <span class="skill-badge" *ngFor="let skill of cat.skills">
            <span class="skill-badge-icon">{{ skill.icon }}</span>
            {{ skill.name }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>

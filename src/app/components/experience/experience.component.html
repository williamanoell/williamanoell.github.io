<section id="experience">
  <div class="container">
    <h2 class="section-title animate-on-scroll">Experiência</h2>
    <p class="section-subtitle animate-on-scroll animate-delay-1">
      Minha trajetória profissional construindo soluções de impacto
    </p>
    <div class="section-divider animate-on-scroll animate-delay-1"></div>

    <div class="timeline">
      <div
        class="timeline-item animate-on-scroll"
        *ngFor="let exp of experiences; let i = index"
        [ngClass]="'animate-delay-' + (i + 2)"
      >
        <!-- Timeline dot and line -->
        <div class="timeline-marker">
          <div class="timeline-dot" [class.current]="exp.current">
            <svg *ngIf="exp.current" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm3.707-10.707a1 1 0 0 0-1.414 0L11 12.586l-1.293-1.293a1 1 0 0 0-1.414 1.414l2 2a1 1 0 0 0 1.414 0l4-4a1 1 0 0 0 0-1.414z"/></svg>
            <div *ngIf="!exp.current" class="dot-inner"></div>
          </div>
          <div class="timeline-line" *ngIf="i < experiences.length - 1"></div>
        </div>

        <!-- Card -->
        <div class="timeline-card glass-card">
          <!-- Header -->
          <div class="card-header">
            <div class="card-header-top">
              <h3 class="company-name gradient-text">{{ exp.company }}</h3>
              <span class="current-badge" *ngIf="exp.current">
                <span class="pulse-dot"></span>
                Atual
              </span>
            </div>
            <div class="role-info">
              <h4 class="role-title">{{ exp.role }}</h4>
              <div class="meta-info">
                <span class="meta-item">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  {{ exp.period }}
                </span>
                <span class="meta-divider">·</span>
                <span class="meta-item">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  {{ exp.location }}
                </span>
              </div>
            </div>
          </div>

          <!-- Bullets -->
          <ul class="bullet-list">
            <li *ngFor="let bullet of exp.bullets">
              <span class="bullet-icon">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </span>
              {{ bullet }}
            </li>
          </ul>

          <!-- Tags -->
          <div class="tag-list">
            <span class="skill-badge-mini" *ngFor="let tag of exp.tags">{{ tag }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

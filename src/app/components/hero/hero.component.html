<section id="hero" class="hero">
  <!-- Background particles / decorations -->
  <div class="hero-bg-orb hero-orb-1"></div>
  <div class="hero-bg-orb hero-orb-2"></div>
  <div class="hero-bg-orb hero-orb-3"></div>

  <div class="container hero-container">
    <!-- Photo -->
    <div class="hero-photo-wrapper">
      <div class="photo-ring"></div>
      <div class="photo-ring photo-ring-2"></div>
      <div class="photo-frame">
        <img src="assets/foto.jpg" alt="William Manoel" class="photo" />
      </div>
    </div>

    <!-- Content -->
    <div class="hero-content">
      <div class="hero-greeting animate-on-scroll">
        <span class="greeting-line"></span>
        <span class="greeting-text">Olá, eu sou</span>
        <span class="greeting-line"></span>
      </div>

      <h1 class="hero-name animate-on-scroll animate-delay-1">
        William Manoel Martins
      </h1>

      <div class="hero-role animate-on-scroll animate-delay-2">
        <span class="role-text">{{ displayedText }}</span><span class="cursor">|</span>
      </div>

      <p class="hero-description animate-on-scroll animate-delay-3">
        Desenvolvedor Full Stack com 3+ anos de experiência em Angular, TypeScript,
        React Native, C# e .NET — construindo soluções digitais robustas e elegantes.
      </p>

      <div class="hero-actions animate-on-scroll animate-delay-4">
        <button class="btn btn-primary" (click)="scrollToProjects()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Ver Projetos
        </button>
        <a
          href="https://www.linkedin.com/in/williamanoell/"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-outline"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn
        </a>
      </div>

      <div class="hero-socials animate-on-scroll animate-delay-5">
        <a
          href="https://github.com/williamanoell"
          target="_blank"
          rel="noopener noreferrer"
          class="social-icon"
          aria-label="GitHub"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        </a>
        <a
          href="https://www.linkedin.com/in/williamanoell/"
          target="_blank"
          rel="noopener noreferrer"
          class="social-icon"
          aria-label="LinkedIn"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
        <a
          href="mailto:williammartins19@outlook.com"
          class="social-icon"
          aria-label="Email"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </a>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator">
    <span>Scroll</span>
    <div class="scroll-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
    </div>
  </div>
</section>

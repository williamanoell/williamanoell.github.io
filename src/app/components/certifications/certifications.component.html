<section id="certifications">
  <div class="container">
    <h2 class="section-title animate-on-scroll">Certificações</h2>
    <p class="section-subtitle animate-on-scroll animate-delay-1">
      Cursos e certificações que complementam minha formação profissional
    </p>
    <div class="section-divider animate-on-scroll animate-delay-1"></div>

    <div class="certs-grid">
      <div
        class="cert-card glass-card animate-on-scroll"
        *ngFor="let cert of certifications; let i = index"
        [ngClass]="'animate-delay-' + (i + 2)"
      >
        <div class="cert-header">
          <div class="cert-icon-wrap">
            <span class="cert-icon">{{ cert.icon }}</span>
          </div>
          <div class="cert-meta">
            <span class="cert-category">{{ cert.category }}</span>
            <span class="cert-year">{{ cert.year }}</span>
          </div>
        </div>

        <div class="cert-body">
          <h3 class="cert-name">{{ cert.name }}</h3>
          <div class="cert-issuer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            {{ cert.issuer }}
          </div>
        </div>

        <div class="cert-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Certificado
        </div>
      </div>
    </div>
  </div>
</section>
